name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      # Packaging is where manifest problems surface (missing icon, bad engines),
      # and they only show up at publish time otherwise.
      - run: npx vsce package --out repodeck.vsix
